<!DOCTYPE html>
<html lang="en">
<head>
    <title>EmoTrack AI Login</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

            /* ✅ Background image from static folder */
            background-image: url("{{ url_for('static', filename='BackImg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: Arial, sans-serif;
        }

        /* Dark overlay to improve text visibility */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            color: white;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            background: #00c6ff;
            color: black;
            transition: 0.3s;
        }

        button:hover {
            background: #f7ff00;
        }

        a {
            color: #00c6ff;
            text-decoration: none;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>EmoTrack AI Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <p style="margin-top:15px;">
            New user? <a href="/register">Create Account</a>
            <p style="color: #7CFC00;">{{ get_flashed_messages()[0] if get_flashed_messages() else "" }}</p>
            
        </p>
    </div>

</body>
</html>
