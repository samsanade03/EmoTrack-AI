<!DOCTYPE html>
<html>
<head>
    <title>Verify Mobile</title>

    <style>
        body {
            background: linear-gradient(120deg, #141E30, #243B55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Verify Mobile Number</h2>

<p>OTP sent to: <b>{{ mobile }}</b></p>

<form method="POST">

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
